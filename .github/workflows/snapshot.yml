name: Generador de instantáneas

on:
  workflow_dispatch:
    inputs:
      requested_by:
        description: 'Quién pide el snapshot'
        required: false
        default: 'manual'

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Hello
        run: |
          echo "Snapshot pedido por: ${{ github.event.inputs.requested_by }}"
          echo "Repo: ${{ github.repository }}"
          echo "Fecha: $(date -u)"
          echo "✅ El mecanismo funciona"

      - name: Leer estado del proyecto
        run: |
          echo "=== STATE.json ==="
          cat .arkmind/STATE.json
          echo "=== PROGRESS (últimas 50 líneas) ==="
          tail -50 PROGRESS.md
